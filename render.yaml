services:
  - type: web
    name: EngagingReader
    env: python
    buildCommand: "bash scripts/build.sh"
    startCommand: "gunicorn app:app --timeout 300"
    envVars:
      - key: GEMINI_API_KEY
        value: "{{.GEMINI_API_KEY}}"
      - key: GOOGLE_PROJECT
        value: "engaging-reader"
      - key: GOOGLE_LOCATION
        value: "us-central1"
      - key: FLASK_DEBUG
        value: "false"
      - key: PORT
        value: "10000"
      - key: GUNICORN_RUNNING
        value: "true"
      - key: DEEPL_API_KEY
        value: "{{.DEEPL_API_KEY}}"
      # Optional: SKIP_I18N_TRANSLATE=1 to skip locale sync during build
    plan: starter
